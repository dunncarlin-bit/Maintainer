name: Daily Issue Classifier

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Max issues to classify (0 = all)"
        required: false
        default: "0"
      dry_run:
        description: "Dry run - print comment but do NOT post"
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-issue-classifier
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  classify-and-report:
    name: Classify Issues & Post Summary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      GITHUB_REPO: ${{ github.repository }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      MAX_ISSUES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_issues || vars.MAX_ISSUES || '0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax-check Python sources
        run: python -m py_compile classify_github_issues.py post_discussion_comment.py

      - name: Run issue classifier
        run: python classify_github_issues.py

      - name: Upload classification CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classified-issues-${{ github.run_id }}
          path: classified_issues.csv
          retention-days: 7

      - name: Post summary to Discussions
        env:
          DISCUSSION_NUMBER: ${{ vars.DISCUSSION_NUMBER }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python post_discussion_comment.py
